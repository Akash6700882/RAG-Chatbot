# NGINX reverse proxy for the Enterprise RAG Chatbot API.
#
# Ships HTTP-only by default so `docker compose up` works out of the box
# with no domain/certs required. Once you own a domain pointed at the
# EC2 host's public IP, run deploy/nginx/init-letsencrypt.sh to obtain a
# certificate, then uncomment the HTTPS server block below and the
# HTTP->HTTPS redirect, replacing YOUR_DOMAIN with your domain name.

upstream rag_chatbot_api {
    server api:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    client_max_body_size 25m;

    # Required for certbot's HTTP-01 domain validation challenge.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- Once HTTPS is enabled below, replace this location with a
    # redirect to https://$host$request_uri; ---
    location / {
        proxy_pass http://rag_chatbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

