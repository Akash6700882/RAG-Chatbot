# NGINX reverse proxy for the Enterprise RAG Chatbot API.
#
# HTTPS is enabled for akashwork.website via Let's Encrypt (see
# deploy/nginx/init-letsencrypt.sh). Plain HTTP now only serves the
# acme-challenge path (for cert renewal) and redirects everything else to
# HTTPS.

upstream rag_chatbot_api {
    server api:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name akashwork.website;

    client_max_body_size 25m;

    # Required for certbot's HTTP-01 domain validation challenge (renewals).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name akashwork.website;

    ssl_certificate     /etc/letsencrypt/live/akashwork.website/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akashwork.website/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 25m;

    location / {
        proxy_pass http://rag_chatbot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
